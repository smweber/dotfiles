# Catppuccin theme (v2), kept in its own file so `toggledark` can reload just
# the theme without re-sourcing the whole config or re-running every plugin.
# https://github.com/catppuccin/tmux/blob/main/docs/reference/configuration.md
#
# toggledark switches light/dark by sed-ing the flavor below, wiping
# catppuccin's option namespace, and re-sourcing this file.

set -g @catppuccin_flavor 'frappe' # latte / frappe / macchiato / mocha
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_flags "none"
set -g @catppuccin_window_text " #W"          # window name
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_directory_text " #{pane_current_path}" # full path, not basename

# Load catppuccin (defines the @catppuccin_status_* modules and palette).
run '~/.tmux/plugins/tmux/catppuccin.tmux'

# Clear the deprecated status-bg/status-fg so catppuccin's `status-style` is the
# sole source of the bar background. The old v0.x plugin set status-bg directly;
# a stale value there keeps painting the bar the old color even after
# status-style switches flavor.
set -gu status-bg
set -gu status-fg

# Assemble the status line from catppuccin modules. Use `-ag` (NOT `-agF`) so
# these stay live references that re-render on every redraw; `-F` would bake
# the current flavor's colors in as frozen literals, leaving stale segments
# after a light/dark toggle.
set -g  status-left ""
set -g  status-left-length 100
set -g  status-right-length 100
set -g  status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_user}"
set -ag status-right "#{E:@catppuccin_status_host}"
set -ag status-right "#{E:@catppuccin_status_session}"
